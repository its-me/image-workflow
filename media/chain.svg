<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" width="640" height="140">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>
  <style>
    .box { fill: #f0f4f8; stroke: #34495e; stroke-width: 2; }
    .label { font-family: sans-serif; font-size: 15px; fill: #2c3e50; text-anchor: middle; }
    .sub { font-family: sans-serif; font-size: 11px; fill: #7f8c8d; text-anchor: middle; }
  </style>

  <rect class="box" x="10" y="30" width="180" height="70" rx="6"/>
  <text class="label" x="100" y="60">Dockerfile</text>
  <text class="sub" x="100" y="80">single-stage (busybox)</text>

  <line x1="190" y1="65" x2="230" y2="65" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect class="box" x="230" y="30" width="180" height="70" rx="6"/>
  <text class="label" x="320" y="60">chain-link-1</text>
  <text class="sub" x="320" y="80">extends single-stage</text>

  <line x1="410" y1="65" x2="450" y2="65" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect class="box" x="450" y="30" width="180" height="70" rx="6"/>
  <text class="label" x="540" y="60">chain-link-2</text>
  <text class="sub" x="540" y="80">extends chain-link-1</text>
</svg>
