name: Update descriptions

on:
  push:
    branches: [main]
    # paths:
    #   - hub.md
    #   - quay.md
  workflow_dispatch:

jobs:
  update-hub:
    name: Update Docker Hub description
    runs-on: ubuntu-slim
    env:
      REPOSITORY: workflow
    steps:
      - uses: actions/checkout@v7

      - name: Update description
        env:
          HUB_USERNAME: ${{ secrets.HUB_USERNAME }}
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
        run: |
          short_description=$(sed -n '1s/^<!-- \(.*\) -->$/\1/p' hub.md)
          full_description=$(tail -n +2 hub.md)
          curl -fsSL -X PATCH "https://hub.docker.com/v2/repositories/$HUB_USERNAME/$REPOSITORY/" \
            -H "Authorization: Bearer $HUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary "$(jq -n \
              --arg description "$short_description" \
              --arg full_description "$full_description" \
              '{description: $description, full_description: $full_description}')"

  update-quay:
    name: Update Quay.io description
    runs-on: ubuntu-slim
    env:
      REPOSITORY: workflow
    steps:
      - uses: actions/checkout@v7

      - name: Update description
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          curl -fsSL -X PUT "https://quay.io/api/v1/repository/${QUAY_NAMESPACE%%+*}/$REPOSITORY" \
            -H "Authorization: Bearer $QUAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary "$(jq -n \
              --rawfile description quay.md \
              '{description: $description}')"
