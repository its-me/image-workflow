name: Check for new release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check and tag new release
    runs-on: ubuntu-slim
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: true

      - name: Check and tag new release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh api repos/its-me/dummy.releases/releases/latest --jq '.tag_name | ltrimstr("v")')
          if ! git ls-remote --exit-code origin "refs/tags/v$latest"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v$latest" -m "v$latest"
            git push origin "v$latest"

            tag="v$latest"

            gh workflow run build-and-deploy.yaml -f tag="$tag"
            for i in $(seq 1 10); do
              run_id=$(gh run list --workflow=build-and-deploy.yaml --event=workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId')
              [ -n "$run_id" ] && break
              sleep 3
            done
            gh run watch "$run_id" --exit-status

            gh workflow run chain.yaml -f tag="$tag"
            gh workflow run simple.yaml -f tag="$tag"
          fi
